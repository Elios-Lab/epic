[project]
name = "epic"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "aiosqlite",
    "alembic",
    "bcrypt<5",
    "fastapi",
    "numpy",
    "passlib[bcrypt]",
    "pydantic-settings",
    "python-jose[cryptography]",
    "sqlalchemy[asyncio]",
    "uvicorn[standard]",
]

[dependency-groups]
dev = [
    "httpx2",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]
