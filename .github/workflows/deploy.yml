name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run unit and API tests
        run: uv run pytest

      - name: Run client SDK tests
        run: uv run pytest epic_client/tests

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to epic-server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: epic.elioslab.net
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/epic
            git pull origin main
            source .venv/bin/activate
            pip install -e . --quiet
            export $(grep -v '^#' .env | xargs)
            alembic upgrade head
            sudo systemctl daemon-reload
            sudo systemctl restart epic
            echo "Deploy complete"
