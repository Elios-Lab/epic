name: Test and Deploy

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run unit and API tests
        run: uv run pytest --cov=epic.core --cov=epic.api --cov-report=term

      - name: Run client SDK tests
        run: uv run pytest epic_client/tests

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to epic-server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: epic.elioslab.net
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/epic
            git pull origin main
            source .venv/bin/activate
            pip install -e . --quiet
            export $(grep -v '^#' .env | xargs)
            alembic upgrade head
            sudo tee /etc/systemd/system/epic.service > /dev/null <<'EOF'
            [Unit]
            Description=EPIC FastAPI
            After=network.target

            [Service]
            User=ubuntu
            Group=ubuntu
            WorkingDirectory=/opt/epic
            EnvironmentFile=/opt/epic/.env
            ExecStart=/opt/epic/.venv/bin/uvicorn epic.api.main:create_app --factory --host 127.0.0.1 --port 8000
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF
            sudo systemctl daemon-reload
            sudo systemctl enable epic
            sudo systemctl restart epic
            echo "Deploy complete"
