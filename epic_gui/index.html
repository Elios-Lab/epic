<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EPIC</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='10' fill='%23061a33'/%3E%3Cpath d='M8 32c4-9 8-9 12 0s8 9 12 0' stroke='%23ffffff' stroke-width='3.5' fill='none' stroke-linecap='round'/%3E%3Cpath d='M32 32l3-17 4 34 4-34 3 17' stroke='%230096c7' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='39' cy='31' r='4' fill='%230096c7'/%3E%3Cpath d='M46 32c3.5-8 7-8 10 0' stroke='%23ffffff' stroke-width='3' fill='none' stroke-linecap='round' opacity='.75'/%3E%3C/svg%3E"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              epic: {
                navy: "#0d3b6e",
                deep: "#061a33",
                cyan: "#0096c7",
                pale: "#e7f7fc",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-epic-deep text-white antialiased">
    <div
      x-data="epicApp()"
      x-init="init()"
      class="min-h-screen bg-[radial-gradient(circle_at_top_left,rgba(0,150,199,0.28),transparent_32rem),linear-gradient(135deg,#061a33_0%,#0d3b6e_52%,#04101f_100%)]"
    >
      <template x-if="state === 'landing'">
        <main class="flex flex-col min-h-screen">
          <section class="flex-1 flex items-center mx-auto grid w-full max-w-6xl gap-10 px-6 py-12 lg:grid-cols-[1.05fr_0.95fr] lg:items-center">
            <div class="space-y-8">
              <div class="inline-flex rounded-md bg-white p-4 shadow-2xl shadow-cyan-950/30">
                <div class="w-72 max-w-[72vw] sm:w-96">
                  <svg viewBox="0 0 590 190" xmlns="http://www.w3.org/2000/svg" aria-label="EPIC logo">
                    <rect width="580" height="180" fill="#ffffff" />
                    <path d="M22,90 C32,70 42,70 52,90 C62,110 72,110 82,90" stroke="#0d3b6e" stroke-width="3" fill="none" stroke-linecap="round" />
                    <path d="M82,90 L89,57 L96,123 L103,57 L110,90" stroke="#0096c7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="96" cy="88" r="4.5" fill="#0096c7" />
                    <path d="M110,90 C120,70 130,70 140,90 C150,110 160,110 170,90" stroke="#0d3b6e" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.45" />
                    <text x="188" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="62" font-weight="900" letter-spacing="3" fill="#0d3b6e">EPIC</text>
                    <line x1="360" y1="52" x2="360" y2="140" stroke="#0096c7" stroke-width="1.5" opacity="0.5" />
                    <text x="374" y="78" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="1.5" fill="#0d3b6e">ELIOS</text>
                    <text x="374" y="100" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Predictive</text>
                    <text x="374" y="119" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Intelligence</text>
                    <text x="374" y="138" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Challenge</text>
                  </svg>
                </div>
              </div>
              <div class="max-w-2xl space-y-5">
                <h1 class="text-5xl font-semibold tracking-normal text-white sm:text-6xl">EPIC</h1>
                <p class="text-xl leading-8 text-cyan-50">
                  A simulation-driven machine learning competition platform based on digital twins.
                </p>
              </div>
              <button
                type="button"
                @click="showLogin()"
                class="inline-flex items-center rounded-md bg-cyan-400 px-6 py-3 text-base font-semibold text-epic-deep shadow-lg shadow-cyan-950/30 transition hover:bg-cyan-300 focus:outline-none focus:ring-4 focus:ring-cyan-200/50"
              >
                Log in
              </button>
            </div>
            <div class="rounded-lg border border-cyan-300/20 bg-white/8 p-6 shadow-2xl shadow-cyan-950/20 backdrop-blur">
              <div class="grid gap-4 sm:grid-cols-3 lg:grid-cols-1">
                <div class="rounded-md border border-white/10 bg-white/10 p-5">
                  <div class="text-sm font-medium uppercase tracking-wide text-cyan-200">Sensor Streams</div>
                  <div class="mt-2 text-base leading-6 text-white/90">Observe live sensor data from running simulations and build your predictions in real time.</div>
                </div>
                <div class="rounded-md border border-white/10 bg-white/10 p-5">
                  <div class="text-sm font-medium uppercase tracking-wide text-cyan-200">Open Competitions</div>
                  <div class="mt-2 text-base leading-6 text-white/90">Organizers publish contests with configurable tasks, schedules, and fault injection scenarios.</div>
                </div>
                <div class="rounded-md border border-white/10 bg-white/10 p-5">
                  <div class="text-sm font-medium uppercase tracking-wide text-cyan-200">Automatic Scoring</div>
                  <div class="mt-2 text-base leading-6 text-white/90">After the evaluation window closes, submit your full forecast and the platform scores it automatically against the hidden ground truth.</div>
                </div>
              </div>
            </div>
          </section>
          <footer class="pb-6 text-center text-sm text-cyan-200/60">
            Powered by
            <a href="https://www.elios.unige.it/" target="_blank" rel="noopener"
               class="underline underline-offset-2 hover:text-cyan-200 transition">
              Elios Lab
            </a>
            <span class="mx-2">·</span>
            <a href="https://github.com/Elios-Lab/epic" target="_blank" rel="noopener"
               class="underline underline-offset-2 hover:text-cyan-200 transition">
              GitHub
            </a>
          </footer>
        </main>
      </template>

      <template x-if="state === 'login'">
        <main class="flex min-h-screen items-center justify-center px-6 py-12">
          <section class="w-full max-w-md rounded-lg border border-cyan-300/20 bg-white p-8 text-slate-900 shadow-2xl shadow-cyan-950/30">
            <button
              type="button"
              @click="state = 'landing'; error = ''"
              class="mb-6 text-sm font-medium text-epic-navy hover:text-epic-cyan"
            >
              Back
            </button>
            <div class="mb-8 w-48">
              <svg viewBox="0 0 590 190" xmlns="http://www.w3.org/2000/svg" aria-label="EPIC logo">
                <rect width="580" height="180" fill="#ffffff" />
                <path d="M22,90 C32,70 42,70 52,90 C62,110 72,110 82,90" stroke="#0d3b6e" stroke-width="3" fill="none" stroke-linecap="round" />
                <path d="M82,90 L89,57 L96,123 L103,57 L110,90" stroke="#0096c7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="96" cy="88" r="4.5" fill="#0096c7" />
                <path d="M110,90 C120,70 130,70 140,90 C150,110 160,110 170,90" stroke="#0d3b6e" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.45" />
                <text x="188" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="62" font-weight="900" letter-spacing="3" fill="#0d3b6e">EPIC</text>
                <line x1="360" y1="52" x2="360" y2="140" stroke="#0096c7" stroke-width="1.5" opacity="0.5" />
                <text x="374" y="78" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="1.5" fill="#0d3b6e">ELIOS</text>
                <text x="374" y="100" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Predictive</text>
                <text x="374" y="119" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Intelligence</text>
                <text x="374" y="138" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Challenge</text>
              </svg>
            </div>
            <h2 class="text-2xl font-semibold text-epic-deep">Log in to EPIC</h2>
            <form class="mt-6 space-y-5" @submit.prevent="login()">
              <label class="block">
                <span class="text-sm font-medium text-slate-700">Username</span>
                <input
                  x-model="credentials.username"
                  type="text"
                  autocomplete="username"
                  required
                  class="mt-2 w-full rounded-md border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-epic-cyan focus:ring-4 focus:ring-cyan-100"
                />
              </label>
              <label class="block">
                <span class="text-sm font-medium text-slate-700">Password</span>
                <input
                  x-model="credentials.password"
                  type="password"
                  autocomplete="current-password"
                  required
                  class="mt-2 w-full rounded-md border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-epic-cyan focus:ring-4 focus:ring-cyan-100"
                />
              </label>
              <p x-show="error" x-text="error" class="rounded-md bg-red-50 px-4 py-3 text-sm text-red-700"></p>
              <button
                type="submit"
                :disabled="loading"
                class="w-full rounded-md bg-epic-navy px-5 py-3 font-semibold text-white transition hover:bg-epic-deep focus:outline-none focus:ring-4 focus:ring-cyan-200 disabled:cursor-not-allowed disabled:opacity-60"
              >
                <span x-show="!loading">Log in</span>
                <span x-show="loading">Logging in...</span>
              </button>
            </form>
          </section>
        </main>
      </template>

      <template x-if="state === 'dashboard'">
        <main class="min-h-screen bg-slate-50 text-slate-900">
          <div
            x-show="impersonating"
            class="flex items-center justify-between gap-4 bg-amber-400 px-6 py-2 text-sm font-semibold text-amber-900"
          >
            <span>Impersonating <span x-text="impersonating"></span></span>
            <button
              type="button"
              @click="stopImpersonating()"
              class="rounded-md bg-amber-900 px-4 py-1.5 text-sm font-semibold text-white transition hover:bg-amber-800"
            >
              Return to admin
            </button>
          </div>
          <nav class="border-b border-slate-200 bg-white">
            <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
              <div class="flex items-center gap-3">
                <div class="w-28">
                  <svg viewBox="0 0 590 190" xmlns="http://www.w3.org/2000/svg" aria-label="EPIC logo">
                    <rect width="580" height="180" fill="#ffffff" />
                    <path d="M22,90 C32,70 42,70 52,90 C62,110 72,110 82,90" stroke="#0d3b6e" stroke-width="3" fill="none" stroke-linecap="round" />
                    <path d="M82,90 L89,57 L96,123 L103,57 L110,90" stroke="#0096c7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="96" cy="88" r="4.5" fill="#0096c7" />
                    <path d="M110,90 C120,70 130,70 140,90 C150,110 160,110 170,90" stroke="#0d3b6e" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.45" />
                    <text x="188" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="62" font-weight="900" letter-spacing="3" fill="#0d3b6e">EPIC</text>
                    <line x1="360" y1="52" x2="360" y2="140" stroke="#0096c7" stroke-width="1.5" opacity="0.5" />
                    <text x="374" y="78" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="1.5" fill="#0d3b6e">ELIOS</text>
                    <text x="374" y="100" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Predictive</text>
                    <text x="374" y="119" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Intelligence</text>
                    <text x="374" y="138" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="400" letter-spacing="0.5" fill="#0096c7">Challenge</text>
                  </svg>
                </div>
                <span class="hidden text-sm font-semibold uppercase tracking-wide text-epic-navy sm:inline">Dashboard</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="max-w-[12rem] truncate text-sm font-medium text-slate-700" x-text="user.username"></span>
                <button
                  type="button"
                  @click="logout()"
                  class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-epic-cyan hover:text-epic-navy"
                >
                  Logout
                </button>
              </div>
            </div>
          </nav>
          <section class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
            <div class="rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
              <template x-if="user.role === 'PARTICIPANT'">
                <div x-init="loadParticipantDashboard()" class="space-y-6">
                  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                    <div>
                      <h1 class="text-3xl font-semibold text-epic-deep">Participant Dashboard</h1>
                      <p class="mt-2 text-slate-600">Join active contests, watch live sensor streams, and submit predictions.</p>
                    </div>
                    <div class="inline-flex rounded-md border border-slate-200 bg-slate-50 p-1">
                      <button
                        type="button"
                        @click="setParticipantTab('contests')"
                        :class="participant.tab === 'contests' ? 'bg-white text-epic-navy shadow-sm' : 'text-slate-600 hover:text-epic-navy'"
                        class="rounded px-4 py-2 text-sm font-semibold transition"
                      >
                        Contests
                      </button>
                      <button
                        type="button"
                        @click="setParticipantTab('activity')"
                        :class="participant.tab === 'activity' ? 'bg-white text-epic-navy shadow-sm' : 'text-slate-600 hover:text-epic-navy'"
                        class="rounded px-4 py-2 text-sm font-semibold transition"
                      >
                        My Activity
                      </button>
                    </div>
                  </div>

                  <p x-show="participant.error" x-text="participant.error" class="rounded-md bg-red-50 px-4 py-3 text-sm text-red-700"></p>
                  <p x-show="participant.success" x-text="participant.success" class="rounded-md bg-cyan-50 px-4 py-3 text-sm text-epic-navy"></p>

                  <div x-show="participant.tab === 'contests'" class="space-y-6">
                    <details class="rounded-md border border-cyan-200 bg-cyan-50">
                      <summary class="cursor-pointer px-5 py-3 text-sm font-semibold text-epic-navy select-none">
                        Getting started — how to prepare a solution
                      </summary>
                      <div class="px-5 pb-5 pt-2 space-y-3 text-sm text-slate-700 leading-6">
                        <p>
                          Every contest runs in <strong>two phases</strong>. During the
                          <strong>observation phase</strong> you watch live sensor data and build your model.
                          After the <strong>evaluation window</strong> closes, you submit a single forecast
                          covering every step in that window — all from a Jupyter notebook using the
                          <strong>epic-elios-client</strong> SDK.
                        </p>
                        <ol class="list-decimal list-inside space-y-1">
                          <li>Install the SDK: <code class="bg-white rounded px-1 py-0.5 border border-slate-200">pip install "epic-elios-client[notebook]"</code></li>
                          <li>Register for a contest and stream the observation phase with <code class="bg-white rounded px-1 py-0.5 border border-slate-200">client.collect()</code>.</li>
                          <li>Train your model on the collected data (the evaluation window is hidden).</li>
                          <li>Once the submission window opens, submit your forecast via <code class="bg-white rounded px-1 py-0.5 border border-slate-200">client.submit()</code>.</li>
                        </ol>
                        <p class="rounded-md bg-amber-50 border border-amber-200 px-3 py-2 text-amber-800">
                          <strong>Tip:</strong> The contest card shows the current phase — <em>Observation</em>, <em>Evaluation</em>, or <em>Submission open</em>. You can only submit once the submission window is open.
                        </p>
                        <div class="flex flex-wrap gap-3 pt-1">
                          <a href="https://pypi.org/project/epic-elios-client/" target="_blank" rel="noopener"
                             class="inline-flex items-center gap-1.5 rounded-md border border-cyan-300 bg-white px-3 py-1.5 text-xs font-semibold text-epic-navy hover:border-epic-cyan transition">
                            SDK on PyPI
                          </a>
                          <a href="https://github.com/Elios-Lab/epic/blob/main/notebooks/quickstart.ipynb" target="_blank" rel="noopener"
                             class="inline-flex items-center gap-1.5 rounded-md border border-cyan-300 bg-white px-3 py-1.5 text-xs font-semibold text-epic-navy hover:border-epic-cyan transition">
                            Quickstart Notebook
                          </a>
                          <a href="https://github.com/Elios-Lab/epic/blob/main/notebooks/mass_spring_damper_forecasting.ipynb" target="_blank" rel="noopener"
                             class="inline-flex items-center gap-1.5 rounded-md border border-cyan-300 bg-white px-3 py-1.5 text-xs font-semibold text-epic-navy hover:border-epic-cyan transition">
                            Example Solution
                          </a>
                          <a href="https://epic.elioslab.net/docs" target="_blank" rel="noopener"
                             class="inline-flex items-center gap-1.5 rounded-md border border-cyan-300 bg-white px-3 py-1.5 text-xs font-semibold text-epic-navy hover:border-epic-cyan transition">
                            API Docs
                          </a>
                        </div>
                      </div>
                    </details>
                    <template x-if="!participant.connectedContest">
                      <div class="space-y-5">
                        <div class="flex items-center justify-between gap-4">
                          <h2 class="text-xl font-semibold text-slate-900">Active Contests</h2>
                          <button
                            type="button"
                            @click="loadActiveContests()"
                            class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-epic-cyan hover:text-epic-navy"
                          >
                            Refresh
                          </button>
                        </div>
                        <p x-show="participant.loadingContests" class="text-sm text-slate-500">Loading active contests...</p>
                        <div x-show="!participant.loadingContests && participant.activeContests.length === 0" class="rounded-md border border-dashed border-slate-300 p-8 text-center text-slate-500">
                          No active contests are available right now.
                        </div>
                        <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                          <template x-for="contest in participant.activeContests" :key="contest.id || contest.contest_id">
                            <article class="rounded-md border border-slate-200 bg-slate-50 p-5">
                              <div class="flex min-h-28 flex-col justify-between gap-4">
                                <div>
                                  <h3 x-text="contest.name" class="text-lg font-semibold text-epic-deep"></h3>
                                  <dl class="mt-3 space-y-2 text-sm text-slate-600">
                                    <div class="flex justify-between gap-4">
                                      <dt class="font-medium text-slate-500">Twin</dt>
                                      <dd x-text="contest.twin_id" class="text-right"></dd>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                      <dt class="font-medium text-slate-500">Sampling</dt>
                                      <dd><span x-text="contest.sampling_rate_hz"></span> Hz</dd>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                      <dt class="font-medium text-slate-500">Start</dt>
                                      <dd x-text="formatDate(contest.start_date)" class="text-right"></dd>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                      <dt class="font-medium text-slate-500">Observation horizon</dt>
                                      <dd x-text="formatDate(contest.end_of_observation)" class="text-right"></dd>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                      <dt class="font-medium text-slate-500">Prediction horizon</dt>
                                      <dd class="text-right"><span x-text="contest.prediction_horizon_seconds"></span> s</dd>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                      <dt class="font-medium text-slate-500">End</dt>
                                      <dd x-text="formatDate(contest.end_date)" class="text-right"></dd>
                                    </div>
                                  </dl>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                  <button
                                    type="button"
                                    @click="isRegistered(contest) ? connectContest(contest) : registerContest(contest)"
                                    class="rounded-md bg-epic-navy px-4 py-2 text-sm font-semibold text-white transition hover:bg-epic-deep focus:outline-none focus:ring-4 focus:ring-cyan-100"
                                  >
                                    <span x-text="isRegistered(contest) ? 'Connect' : 'Register'"></span>
                                  </button>
                                  <button
                                    type="button"
                                    @click="monitor.monitoredContest && contestId(monitor.monitoredContest) === contestId(contest) ? stopMonitor() : startMonitor(contest)"
                                    class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-epic-cyan hover:text-epic-navy focus:outline-none focus:ring-4 focus:ring-cyan-100"
                                  >
                                    <span x-text="monitor.monitoredContest && contestId(monitor.monitoredContest) === contestId(contest) ? 'Stop' : 'Monitor'"></span>
                                  </button>
                                </div>
                              </div>
                            </article>
                          </template>
                        </div>
                        <div x-show="monitor.monitoredContest" class="space-y-3">
                          <div class="flex items-center justify-between gap-4">
                            <div>
                              <h3 class="text-base font-semibold text-slate-900"
                                  x-text="monitor.monitoredContest?.name"></h3>
                              <p class="text-sm text-slate-500">Live sensor readings — read-only view</p>
                            </div>
                            <button
                              type="button"
                              @click="stopMonitor()"
                              class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-epic-cyan hover:text-epic-navy"
                            >
                              Stop
                            </button>
                          </div>
                          <p x-show="monitor.monitorError" x-text="monitor.monitorError"
                             class="rounded-md bg-amber-50 px-4 py-3 text-sm text-amber-800"></p>
                          <div class="rounded-md border border-slate-200 bg-white p-4">
                            <div class="h-72">

    <script>
      function epicApp() {
        return {
          state: "landing",
          loading: false,
          error: "",
          credentials: {
            username: "",
            password: "",
          },
          token: null,
          originalToken: null,
          impersonating: null,
          user: {
            username: "",
            role: "",
          },
          monitor: {
            monitoredContest: null,
            monitorChart: null,   // kept for legacy x-show guards only — actual Chart.js instance lives in this._monitorChart (non-reactive)
            monitorSocket: null,
            monitorError: "",
          },
          participant: {
            tab: "contests",
            dashboardLoaded: false,
            loadingContests: false,
            loadingActivity: false,
            submitting: false,
            activeContests: [],
            registrations: [],
            registeredContestIds: new Set(),
            connectedContest: null,
            latestObservation: {
              sequence_id: null,
              timestamp: "",
            },
            submissionPayload: JSON.stringify(
              {
                forecast: {
                  sensor_id: [],
                },
              },
              null,
              2
            ),
            activity: [],
            error: "",
            success: "",
          },
          organizer: {
            tab: "contests",
            dashboardLoaded: false,
            loadingContests: false,
            loadingTemplates: false,
            loadingLeaderboardId: null,
            creating: false,
            deletingContestId: null,
            pausingContestId: null,
            catalogProfile: null,
            loadingCatalog: false,
            contests: [],
            templates: [],
            selectedTemplate: null,
            newStep: 1,
            form: {
              name: "",
              description: "",
              visibility: "PUBLIC",
              start_date: "",
              end_date: "",
              sampling_rate_hz: 1,
              twin_id: "",
              sensor_selections: [],
              fault_entries: [],
              initial_conditions: null,
              task_type: "FORECASTING",
              metric_ids: ["mae"],
              score_against: "ground_truth",
              observation_horizon_days: 2,
              prediction_horizon_seconds: 3600,
            },
            expandedContestId: null,
            extendingContestId: null,
            newEndDate: "",
            leaderboards: {},
            error: "",
            success: "",
          },
          deleteModal: {
            open: false,
            contestName: "",
            confirm: () => {},
            cancel: () => {},
          },
          admin: {
            tab: "overview",
            dashboardLoaded: false,
            loadingOverview: false,
            loadingUsers: false,
            contests: [],
            users: [],
            totalUsers: 0,
            contestSortKey: "name",
            contestSortDirection: "asc",
            deletingContestId: null,
            pausingContestId: null,
            userSearch: "",
            createUserForm: { username: "", email: "", password: "", role: "PARTICIPANT" },
            creatingUser: false,
            showCreateUser: false,
            error: "",
            success: "",
          },
          sensorChart: null,
          streamSocket: null,
          init() {
            const token = localStorage.getItem("epic_token");
            if (!token) {
              return;
            }
            this.token = token;
            const payload = this.decodeToken(token);
            if (payload && payload.username && payload.role) {
              this.user = { username: payload.username, role: payload.role };
              this.state = "dashboard";
            } else {
              this.logout();
            }
          },
          showLogin() {
            this.error = "";
            this.state = "login";
          },
          async login() {
            this.loading = true;
            this.error = "";
            try {
              const response = await fetch("/api/v1/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(this.credentials),
              });
              if (!response.ok) {
                throw new Error("Invalid username or password.");
              }
              const data = await response.json();
              this.token = data.access_token;
              localStorage.setItem("epic_token", this.token);
              const payload = this.decodeToken(this.token);
              this.user = {
                username: payload.username,
                role: payload.role,
              };
              this.credentials.password = "";
              this.state = "dashboard";
            } catch (error) {
              this.error = error.message || "Login failed.";
              localStorage.removeItem("epic_token");
              this.token = null;
            } finally {
              this.loading = false;
            }
          },
          logout() {
            this.disconnectContest();
            localStorage.removeItem("epic_token");
            this.token = null;
            this.user = { username: "", role: "" };
            this.credentials.password = "";
            this.error = "";
            this.state = "landing";
          },
          async apiRequest(path, options = {}) {
            const headers = {
              ...(options.headers || {}),
              Authorization: `Bearer ${this.token}`,
            };
            if (options.body !== undefined) {
              headers["Content-Type"] = "application/json";
            }
            const response = await fetch(path, { ...options, headers });
            const text = await response.text();
            let data = {};
            try {
              data = text ? JSON.parse(text) : {};
            } catch (_) {}
            if (!response.ok) {
              const message = data.error?.message || `Request failed (${response.status})`;
              const error = new Error(message);
              error.status = response.status;
              throw error;
            }
            return data;
          },
          async loadParticipantDashboard() {
            if (this.participant.dashboardLoaded) {
              return;
            }
            this.participant.dashboardLoaded = true;
            await this.loadActiveContests();
          },
          async setParticipantTab(tab) {
            this.participant.tab = tab;
            this.participant.error = "";
            this.participant.success = "";
            this.stopMonitor();
            if (tab === "contests") {
              await this.loadActiveContests();
            }
            if (tab === "activity") {
              this.disconnectContest();
              await this.loadMyActivity();
            }
          },
          contestId(contest) {
            return contest.contest_id || contest.id;
          },
          formatDate(value) {
            if (!value) {
              return "-";
            }
            return new Date(value).toLocaleString();
          },
          formatScore(value) {
            if (value === null || value === undefined) {
              return "-";
            }
            return Number(value).toFixed(4);
          },
          contestPhaseLabel(contest) {
            if (!contest.end_of_observation) return "";
            const now = Date.now();
            const obsEnd = new Date(contest.end_of_observation).getTime();
            const evalEnd = obsEnd + (contest.prediction_horizon_seconds || 0) * 1000;
            if (now < obsEnd) return "Observation";
            if (now < evalEnd) return "Evaluation";
            return "Submission open";
          },
          contestPhaseClass(contest) {
            if (!contest.end_of_observation) return "";
            const now = Date.now();
            const obsEnd = new Date(contest.end_of_observation).getTime();
            const evalEnd = obsEnd + (contest.prediction_horizon_seconds || 0) * 1000;
            if (now < obsEnd) return "bg-cyan-100 text-cyan-800";
            if (now < evalEnd) return "bg-purple-100 text-purple-800";
            return "bg-emerald-100 text-emerald-800";
          },
          statusBadgeClass(status) {
            const classes = {
              ACTIVE: "bg-emerald-100 text-emerald-800",
              SCHEDULED: "bg-yellow-100 text-yellow-800",
              DRAFT: "bg-slate-200 text-slate-700",
              PAUSED: "bg-amber-100 text-amber-800",
              CLOSED: "bg-red-100 text-red-800",
              ARCHIVED: "bg-slate-300 text-slate-700",
            };
            return classes[status] || "bg-slate-200 text-slate-700";
          },
          roleBadgeClass(role) {
            const classes = {
              ADMINISTRATOR: "bg-blue-100 text-blue-800",
              ORGANIZER: "bg-emerald-100 text-emerald-800",
              PARTICIPANT: "bg-slate-200 text-slate-700",
            };
            return classes[role] || "bg-slate-200 text-slate-700";
          },
          toLocalDateTime(value) {
            if (!value) {
              return "";
            }
            const date = new Date(value);
            const offsetMs = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - offsetMs).toISOString().slice(0, 16);
          },
          toApiDateTime(value) {
            return new Date(value).toISOString();
          },
          async loadRegistrations() {
            const response = await this.apiRequest("/api/v1/contest-registrations");
            this.participant.registrations = response.registrations || [];
            this.participant.registeredContestIds = new Set(
              this.participant.registrations
                .filter((registration) => registration.status === "REGISTERED")
                .map((registration) => registration.contest_id)
            );
          },
          async loadActiveContests() {
            this.participant.loadingContests = true;
            this.participant.error = "";
            this.participant.success = "";
            try {
              await this.loadRegistrations();
              const response = await this.apiRequest("/api/v1/contests?status=ACTIVE");
              this.participant.activeContests = response.contests || [];
            } catch (error) {
              this.participant.error = error.message || "Unable to load active contests.";
            } finally {
              this.participant.loadingContests = false;
            }
          },
          isRegistered(contest) {
            return this.participant.registeredContestIds.has(this.contestId(contest));
          },
          async registerContest(contest) {
            this.participant.error = "";
            this.participant.success = "";
            const contestId = this.contestId(contest);
            try {
              await this.apiRequest("/api/v1/contest-registrations", {
                method: "POST",
                body: JSON.stringify({ contest_id: contestId }),
              });
              this.participant.registeredContestIds = new Set([
                ...this.participant.registeredContestIds,
                contestId,
              ]);
              this.participant.success = "Registration confirmed.";
            } catch (error) {
              if (error.status === 409 && error.message.includes("Already registered")) {
                this.participant.registeredContestIds = new Set([
                  ...this.participant.registeredContestIds,
                  contestId,
                ]);
                this.participant.success = "Registration confirmed.";
                return;
              }
              this.participant.error = error.message || "Registration failed.";
            }
          },
          connectContest(contest) {
            this.disconnectContest();
            this.participant.error = "";
            this.participant.success = "";
            this.participant.connectedContest = contest;
            this.participant.latestObservation = { sequence_id: null, timestamp: "" };
            this.participant.submissionPayload = JSON.stringify(
              {
                forecast: {
                  sensor_id: [],
                },
              },
              null,
              2
            );
            this.$nextTick(() => {
              this.createSensorChart();
              this.openStream(contest);
            });
          },
          disconnectContest() {
            this.stopMonitor();
            if (this.streamSocket) {
              this.streamSocket.close();
              this.streamSocket = null;
            }
            if (this.sensorChart) {
              this.sensorChart.destroy();
              this.sensorChart = null;
            }
            this.participant.connectedContest = null;
          },
          startMonitor(contest) {
            this.stopMonitor();
            this.monitor.monitoredContest = contest;
            this.monitor.monitorError = "";
            this._monitorChartReady = false;
            // Open the stream immediately so no messages are missed while the
            // chart initialises. Messages are buffered and flushed once the
            // chart is ready.
            this._monitorBuffer = [];
            this.openMonitorStream(contest);
            // Wait for Alpine to show the canvas, then create the chart.
            this.$nextTick(() => this.createMonitorChart());
          },
          stopMonitor() {
            if (this.monitor.monitorSocket) {
              this.monitor.monitorSocket.close();
              this.monitor.monitorSocket = null;
            }
            if (this._monitorChart) {
              this._monitorChart.destroy();
              this._monitorChart = null;
            }
            this.monitor.monitorChart = null;
            this.monitor.monitoredContest = null;
            this._monitorChartReady = false;
            this._monitorBuffer = [];
          },
          createMonitorChart() {
            const canvas = this.$refs.monitorChart;
            if (!canvas || typeof Chart === "undefined") {
              setTimeout(() => this.createMonitorChart(), 50);
              return;
            }
            // Wait until the canvas has real pixel dimensions (x-show may still
            // be applying display:none on the parent at this tick).
            if (canvas.offsetWidth === 0 || canvas.offsetHeight === 0) {
              setTimeout(() => this.createMonitorChart(), 50);
              return;
            }
            if (this._monitorChart) {
              this._monitorChart.destroy();
              this._monitorChart = null;
            }
            // Use responsive:false and set pixel size explicitly to avoid
            // Chart.js infinite resize loops caused by CSS percentage heights.
            canvas.width  = canvas.parentElement.clientWidth  || 600;
            canvas.height = canvas.parentElement.clientHeight || 288;
            this._monitorChart = new Chart(canvas, {
              type: "line",
              data: { labels: [], datasets: [] },
              options: {
                animation: false,
                responsive: false,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: "nearest" },
                scales: {
                  x: { ticks: { color: "#475569", maxTicksLimit: 10 }, grid: { color: "#e2e8f0" } },
                  y: { ticks: { color: "#475569" }, grid: { color: "#e2e8f0" } },
                },
                plugins: { legend: { labels: { color: "#0f172a" } } },
              },
            });
            this._monitorChartReady = true;
            // Flush any observations that arrived before the chart was ready.
            for (const obs of (this._monitorBuffer || [])) this.appendMonitorObservation(obs);
            this._monitorBuffer = [];
          },
          openMonitorStream(contest) {
            const contestId = this.contestId(contest);
            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            const url = `${protocol}://${window.location.host}/api/v1/ws/contests/${contestId}?token=${encodeURIComponent(this.token)}`;
            const connect = () => {
              if (!this.monitor.monitoredContest) return; // monitor was stopped
              const ws = new WebSocket(url);
              this.monitor.monitorSocket = ws;
              ws.onmessage = (event) => {
                const observation = JSON.parse(event.data);
                if (observation.event === "evaluation_started") {
                  this.monitor.monitorError = "Observation phase ended — the stream has closed.";
                  return;
                }
                if (observation.event === "contest_closed") {
                  this.monitor.monitorError = "Contest has been closed.";
                  return;
                }
                this.appendMonitorObservation(observation);
              };
              ws.onerror = () => {
                this.monitor.monitorError = "Monitor stream connection failed.";
              };
              ws.onclose = () => {
                if (!this.monitor.monitoredContest) return; // intentional stop
                if (!this.monitor.monitorError) {
                  // Transient disconnect — reconnect after 2 s.
                  this.monitor.monitorError = "Stream disconnected — reconnecting…";
                  setTimeout(() => {
                    if (this.monitor.monitoredContest) {
                      this.monitor.monitorError = "";
                      connect();
                    }
                  }, 2000);
                }
              };
            };
            connect();
          },
          appendMonitorObservation(observation) {
            if (observation.event) return;
            // Buffer observations that arrive before the chart is initialised.
            if (!this._monitorChartReady) {
              if (!this._monitorBuffer) this._monitorBuffer = [];
              if (this._monitorBuffer.length < 300) this._monitorBuffer.push(observation);
              return;
            }
            const chart = this._monitorChart;
            if (!chart) return;
            const sensors = observation.sensors || {};
            const colors = ["#0d3b6e", "#0096c7", "#14b8a6", "#6366f1", "#f97316", "#64748b"];
            for (const sensorId of Object.keys(sensors)) {
              if (!chart.data.datasets.some((d) => d.label === sensorId)) {
                const color = colors[chart.data.datasets.length % colors.length];
                chart.data.datasets.push({
                  label: sensorId, data: [], borderColor: color,
                  backgroundColor: color, borderWidth: 2, pointRadius: 0, tension: 0.25,
                });
              }
            }
            chart.data.labels.push(observation.sequence_id);
            for (const dataset of chart.data.datasets) {
              dataset.data.push(sensors[dataset.label] ?? null);
              if (dataset.data.length > 150) dataset.data.shift();
            }
            if (chart.data.labels.length > 150) chart.data.labels.shift();
            // Throttle redraws: store the pending flag on the chart object
            // itself (not on Alpine's reactive `this`) so the RAF callback
            // never triggers an Alpine re-render that would detach the canvas.
            if (!chart._rafPending) {
              chart._rafPending = true;
              requestAnimationFrame(() => {
                chart._rafPending = false;
                if (chart.canvas?.isConnected) chart.update("none");
              });
            }
          },
          createSensorChart() {
            if (!this.$refs.sensorChart || typeof Chart === "undefined") {
              return;
            }
            this.sensorChart = new Chart(this.$refs.sensorChart, {
              type: "line",
              data: {
                labels: [],
                datasets: [],
              },
              options: {
                animation: false,
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                  intersect: false,
                  mode: "nearest",
                },
                scales: {
                  x: {
                    ticks: { color: "#475569", maxTicksLimit: 10 },
                    grid: { color: "#e2e8f0" },
                  },
                  y: {
                    ticks: { color: "#475569" },
                    grid: { color: "#e2e8f0" },
                  },
                },
                plugins: {
                  legend: {
                    labels: { color: "#0f172a" },
                  },
                },
              },
            });
          },
          openStream(contest) {
            const contestId = this.contestId(contest);
            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            const url = `${protocol}://${window.location.host}/api/v1/ws/contests/${contestId}?token=${encodeURIComponent(this.token)}`;
            this.streamSocket = new WebSocket(url);
            this.streamSocket.onmessage = (event) => {
              const observation = JSON.parse(event.data);
              this.participant.latestObservation = {
                sequence_id: observation.sequence_id,
                timestamp: observation.timestamp,
              };
              this.appendObservation(observation);
            };
            this.streamSocket.onerror = () => {
              this.participant.error = "Live stream connection failed.";
            };
            this.streamSocket.onclose = () => {
              if (this.participant.connectedContest) {
                this.participant.error = "Live stream disconnected.";
              }
            };
          },
          appendObservation(observation) {
            if (!this.sensorChart) {
              return;
            }
            const label = observation.sequence_id;
            const sensors = observation.sensors || {};
            const colors = ["#0d3b6e", "#0096c7", "#14b8a6", "#6366f1", "#f97316", "#64748b"];
            for (const sensorId of Object.keys(sensors)) {
              if (!this.sensorChart.data.datasets.some((dataset) => dataset.label === sensorId)) {
                const color = colors[this.sensorChart.data.datasets.length % colors.length];
                this.sensorChart.data.datasets.push({
                  label: sensorId,
                  data: [],
                  borderColor: color,
                  backgroundColor: color,
                  borderWidth: 2,
                  pointRadius: 0,
                  tension: 0.25,
                });
              }
            }
            this.sensorChart.data.labels.push(label);
            for (const dataset of this.sensorChart.data.datasets) {
              dataset.data.push(sensors[dataset.label] ?? null);
              if (dataset.data.length > 100) {
                dataset.data.shift();
              }
            }
            if (this.sensorChart.data.labels.length > 100) {
              this.sensorChart.data.labels.shift();
            }
            this.sensorChart.update("none");
          },
          async submitPrediction() {
            this.participant.submitting = true;
            this.participant.error = "";
            this.participant.success = "";
            try {
              const payload = JSON.parse(this.participant.submissionPayload);
              const contestId = this.contestId(this.participant.connectedContest);
              const response = await this.apiRequest(
                `/api/v1/contests/${contestId}/submissions`,
                {
                  method: "POST",
                  body: JSON.stringify({
                    task_id: "forecasting",
                    payload,
                  }),
                }
              );
              this.participant.success = `Submission ${response.submission_id} received.`;
            } catch (error) {
              this.participant.error = error.message || "Submission failed.";
            } finally {
              this.participant.submitting = false;
            }
          },
          async loadMyActivity() {
            this.participant.loadingActivity = true;
            this.participant.error = "";
            this.participant.success = "";
            try {
              await this.loadRegistrations();
              const registeredContestIds = Array.from(this.participant.registeredContestIds);
              const contestsResponse = await this.apiRequest("/api/v1/contests");
              const contestsById = new Map(
                (contestsResponse.contests || []).map((contest) => [this.contestId(contest), contest])
              );
              const activity = [];
              for (const contestId of registeredContestIds) {
                let contest = contestsById.get(contestId);
                if (!contest) {
                  contest = await this.apiRequest(`/api/v1/contests/${contestId}`);
                }
                const submissionsResponse = await this.apiRequest(
                  `/api/v1/contests/${contestId}/submissions`
                );
                const submissions = [];
                for (const submission of submissionsResponse.submissions || []) {
                  let score = null;
                  if (submission.status === "EVALUATED") {
                    const scoresResponse = await this.apiRequest(
                      `/api/v1/submissions/${submission.submission_id}/scores`
                    );
                    const scores = scoresResponse.scores || [];
                    if (scores.length > 0) {
                      score = scores.reduce((total, item) => total + Number(item.value), 0) / scores.length;
                    }
                  }
                  submissions.push({ ...submission, score });
                }
                activity.push({ contest, submissions });
              }
              this.participant.activity = activity;
            } catch (error) {
              this.participant.error = error.message || "Unable to load activity.";
            } finally {
              this.participant.loadingActivity = false;
            }

              ns.success = `Contest "${contest.name}" paused — simulation will stop within the next few steps.`;
            } catch (error) {

              this.deleteModal.cancel  = () => { this.deleteModal.open = false; resolve(false); };
              this.deleteModal.open = true;
            });
            if (!confirmed) return;

          async loadCatalogProfile(twin_id, template) {
            this.organizer.loadingCatalog = true;
            try {
              const profile = await this.apiRequest(`/api/v1/catalog/${twin_id}`);
              this.organizer.catalogProfile = profile;
              // Build sensor_selections from catalog sensors + template overrides
              const templateSensorMap = {};
              for (const sc of (template.sensor_configs || [])) {
                templateSensorMap[sc.sensor_id] = sc;
              }
              this.organizer.form.sensor_selections = profile.sensors.map(sensor => {
                const tc = templateSensorMap[sensor.sensor_id] || {};
                return {
                  sensor_id: sensor.sensor_id,
                  name: sensor.name,
                  unit: sensor.unit,
                  enabled: sensor.sensor_id in templateSensorMap,
                  noise_std: tc.noise_std ?? 0.0,
                  gain: tc.gain ?? 1.0,
                  bias: tc.bias ?? 0.0,
                  drift_rate: tc.drift_rate ?? 0.0,
                  min_value: tc.min_value ?? null,
                  max_value: tc.max_value ?? null,
                  quantization: tc.quantization ?? 0.0,
                  latency_steps: tc.latency_steps ?? 0,
                  p_false_reading: tc.p_false_reading ?? 0.0,
                  p_outlier: tc.p_outlier ?? 0.0,
                  showAdvanced: false,
                };
              });
              // Build fault_entries from template fault_schedule
              this.organizer.form.fault_entries = (template.fault_schedule || []).map(fe => ({
                fault_id: fe.fault_id,
                start_time: fe.start_time ?? 0,
                end_time: fe.end_time ?? null,
                severity: fe.severity ?? 0.5,
              }));
            } finally {

          addFaultEntry() {
            const faults = this.organizer.catalogProfile?.faults || [];
            if (faults.length === 0) return;
            this.organizer.form.fault_entries.push({
              fault_id: faults[0].fault_id,
              start_time: 0,
              end_time: null,
              severity: 0.5,
            });

          removeFaultEntry(idx) {
            this.organizer.form.fault_entries.splice(idx, 1);
          },
          async createContest() {
            // Build sensor_configs from sensor_selections
            const sensor_configs = this.organizer.form.sensor_selections
              .filter(s => s.enabled)
              .map(s => {
                const cfg = { sensor_id: s.sensor_id };
                if (s.noise_std)        cfg.noise_std        = s.noise_std;
                if (s.gain !== 1.0)     cfg.gain             = s.gain;
                if (s.bias)             cfg.bias             = s.bias;
                if (s.drift_rate)       cfg.drift_rate       = s.drift_rate;
                if (s.min_value !== null && s.min_value !== "") cfg.min_value = Number(s.min_value);
                if (s.max_value !== null && s.max_value !== "") cfg.max_value = Number(s.max_value);
                if (s.quantization)     cfg.quantization     = s.quantization;
                if (s.latency_steps)    cfg.latency_steps    = s.latency_steps;
                if (s.p_false_reading)  cfg.p_false_reading  = s.p_false_reading;
                if (s.p_outlier)        cfg.p_outlier        = s.p_outlier;
                return cfg;
              });
            if (sensor_configs.length === 0) {
              this.organizer.error = "Please enable at least one sensor.";
              return;
            }
            // Build fault_schedule from fault_entries
            const fault_schedule = this.organizer.form.fault_entries.map(fe => ({
              fault_id: fe.fault_id,
              start_time: Number(fe.start_time),
              end_time: (fe.end_time !== null && fe.end_time !== "") ? Number(fe.end_time) : null,
              severity: Number(fe.severity),
            }));
            this.organizer.creating = true;
            this.organizer.error = "";
            this.organizer.success = "";
            try {
              const request = {
                name: this.organizer.form.name,
                description: this.organizer.form.description,
                visibility: this.organizer.form.visibility,
                task_type: this.organizer.form.task_type,
                metric_ids: this.organizer.form.metric_ids,
                twin_id: this.organizer.form.twin_id,
                sensor_configs: sensor_configs,
                fault_schedule: fault_schedule,
                initial_conditions: this.organizer.form.initial_conditions,
                sampling_rate_hz: Number(this.organizer.form.sampling_rate_hz),
                start_date: this.toApiDateTime(this.organizer.form.start_date),
                end_date: this.toApiDateTime(this.organizer.form.end_date),
                end_of_observation: new Date(
                  new Date(this.organizer.form.start_date).getTime() +
                  Number(this.organizer.form.observation_horizon_days) * 86400 * 1000
                ).toISOString(),
                prediction_horizon_seconds: Number(this.organizer.form.prediction_horizon_seconds),
                score_against: this.organizer.form.score_against,
              };
              const created = await this.apiRequest("/api/v1/contests", {
                method: "POST",
                body: JSON.stringify(request),
              });
              this.organizer.contests = [created, ...this.organizer.contests];
              this.organizer.success = "Contest created successfully.";
              this.organizer.newStep = 1;
              this.organizer.selectedTemplate = null;
              this.organizer.tab = "contests";
            } catch (error) {
              this.organizer.error = error.message || "Contest creation failed.";
            } finally {
              this.organizer.creating = false;
            }
          },

          contestsByStatus() {
            return this.admin.contests.reduce((counts, contest) => {
              counts[contest.status] = (counts[contest.status] || 0) + 1;
              return counts;
            }, {});

          sortAdminContests(key) {
            if (this.admin.contestSortKey === key) {
              this.admin.contestSortDirection =
                this.admin.contestSortDirection === "asc" ? "desc" : "asc";
            } else {
              this.admin.contestSortKey = key;
              this.admin.contestSortDirection = "asc";
            }
          },
          sortedAdminContests() {
            const key = this.admin.contestSortKey;
            const direction = this.admin.contestSortDirection === "asc" ? 1 : -1;
            return [...this.admin.contests].sort((left, right) => {
              const leftValue = left[key] ?? "";
              const rightValue = right[key] ?? "";
              if (typeof leftValue === "number" && typeof rightValue === "number") {
                return (leftValue - rightValue) * direction;
              }
              return String(leftValue).localeCompare(String(rightValue)) * direction;
            });
          },
          allowedStatusTransitions(status) {
            // Pause and resume are handled by dedicated PUT endpoints and
            // their own buttons — not via this transition selector.
            const transitions = {
              DRAFT: ["SCHEDULED", "ACTIVE"],
              SCHEDULED: ["ACTIVE"],
              ACTIVE: ["CLOSED"],
              PAUSED: ["CLOSED"],
              CLOSED: ["ARCHIVED"],
              ARCHIVED: [],
            };
            return transitions[status] || [];
          },
          async transitionAdminContest(contest, status) {
            if (!status) {
              return;
            }
            this.admin.error = "";
            this.admin.success = "";
            try {
              const contestId = this.contestId(contest);
              const updated = await this.apiRequest(`/api/v1/contests/${contestId}`, {
                method: "PATCH",
                body: JSON.stringify({ status }),
              });
              this.admin.contests = this.admin.contests.map((item) =>
                this.contestId(item) === this.contestId(updated) ? updated : item
              );
              this.admin.success = `Contest moved to ${status}.`;
            } catch (error) {
              this.admin.error = error.message || "Contest transition failed.";
            }
          },
          filteredAdminUsers() {
            const query = this.admin.userSearch.trim().toLowerCase();
            if (!query) {
              return this.admin.users;
            }
            return this.admin.users.filter((account) =>
              `${account.username} ${account.email}`.toLowerCase().includes(query)
            );
          },
          async createUser() {
            this.admin.creatingUser = true;
            this.admin.error = "";
            this.admin.success = "";
            try {
              const created = await this.apiRequest("/api/v1/users", {

              this.admin.showCreateUser = false;
            } catch (error) {
              this.admin.error = error.message || "User creation failed.";

              this.admin.creatingUser = false;

          async impersonate(account) {
            try {
              const data = await this.apiRequest(`/api/v1/users/${account.id}/impersonate`, {
                method: "POST",
              });
              this.originalToken = this.token;
              this.token = data.access_token;
              localStorage.setItem("epic_token", this.token);
              const payload = this.decodeToken(this.token);
              this.user = { username: payload.username, role: payload.role };
              this.impersonating = payload.username;
              this.state = "dashboard";
            } catch (error) {
              this.admin.error = error.message || "Impersonation failed.";
            }
          },
          stopImpersonating() {
            this.token = this.originalToken;
            this.originalToken = null;
            this.impersonating = null;
            localStorage.setItem("epic_token", this.token);
            const payload = this.decodeToken(this.token);
            this.user = { username: payload.username, role: payload.role };
            this.state = "dashboard";

          async updateUserRole(account, role) {
            if (role === account.role) {
              return;
            }
            this.admin.error = "";
            this.admin.success = "";
            try {
              const updated = await this.apiRequest(`/api/v1/users/${account.id}`, {
                method: "PATCH",
                body: JSON.stringify({ role }),
              });
              this.replaceAdminUser(updated);
              this.admin.success = "User role updated.";
            } catch (error) {
              this.admin.error = error.message || "User role update failed.";
            }
          },
          async toggleUserActive(account) {
            this.admin.error = "";
            this.admin.success = "";
            try {
              const updated = await this.apiRequest(`/api/v1/users/${account.id}`, {
                method: "PATCH",
                body: JSON.stringify({ is_active: !account.is_active }),
              });
              this.replaceAdminUser(updated);
              this.admin.success = updated.is_active
                ? "User account activated."
                : "User account deactivated.";
            } catch (error) {
              this.admin.error = error.message || "User active status update failed.";
            }
          },
          replaceAdminUser(updated) {
            this.admin.users = this.admin.users.map((account) =>
              account.id === updated.id ? updated : account
            );
          },
          decodeToken(token) {
            try {
              const payload = token.split(".")[1];
              const base64 = payload.replace(/-/g, "+").replace(/_/g, "/");
              const json = decodeURIComponent(
                atob(base64)
                  .split("")
                  .map((char) => "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2))
                  .join("")
              );
              return JSON.parse(json);
            } catch (error) {
              return null;
            }
          },
        };
      }
    </script>
